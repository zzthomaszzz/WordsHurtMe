name: Deploy to GitHub Pages and itch.io

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web version
        run: python -m pygbag --build main.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Install itch.io Butler
        uses: remarkablegames/setup-butler@v2

      - name: Upload Web Build to itch.io
        run: butler push build/web ${{ secrets.ITCH_USERNAME }}/${{ secrets.ITCH_GAME_SLUG }}:html5
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
