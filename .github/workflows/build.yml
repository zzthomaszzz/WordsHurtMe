name: Build Windows EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller main.spec

      - name: Copy assets into dist
        run: Copy-Item -Recurse -Force assets dist\assets

      - name: Package dist folder
        run: Compress-Archive -Path dist/* -DestinationPath WordsHurtMe.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordsHurtMe-windows
          path: WordsHurtMe.zip
          retention-days: 30

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Download WordsHurtMe.zip, unzip, and run main.exe to play."
          prerelease: true
          files: WordsHurtMe.zip
